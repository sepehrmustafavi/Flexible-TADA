# Model Configuration
model:
  model_name_or_path: "microsoft/deberta-v2-xxlarge"
  tokenizer_name: "microsoft/deberta-v2-xxlarge"
  max_seq_length: 128

# Dataset Configuration
dataset:
  benchmark: "glue"
  tasks: ["mnli", "sst2", "mrpc", "cola", "qnli", "qqp", "rte", "stsb"]
  validation_split: "validation"

# Global Training Hyperparameters
training:
  optimizer: "adamw"
  lr_scheduler_type: "linear"
  warmup_ratio: 0.06
  weight_decay: 0.1
  # XXLarge is much larger than v3-base.
  # Reduce if you encounter OOM.
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  num_train_epochs: 10
  logging_steps: 100
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 1
  load_best_model_at_end: true

# Method-Specific Configurations
methods:
  fft:
    learning_rate: 2e-5

  lora:
    learning_rate: 4e-4
    r: 8
    lora_alpha: 16
    target_modules: ["query_proj", "value_proj"]
    lora_dropout: 0.1

  static_tada:
    learning_rate: 5e-4
    trainable_layers: ["embeddings"]

  flex_tada:
    learning_rate: 3e-4
    # DeBERTa-v2-xxlarge has 48 layers (0-47)
    trainable_layers: ["embeddings", "encoder.layer.47"]

# Hardware & Reporting
system:
  seed: 42
  fp16: false
  report_to: "tensorboard"
  save_final_model: false
