# Model Configuration
model:
  model_name_or_path: "./model_files/Qwen3.5-2B"
  tokenizer_name: "Qwen/Qwen3.5-2B"
  max_seq_length: 512 # Sufficient for most SuperGLUE reasoning tasks
  trust_remote_code: true

# Dataset Configuration
dataset:
  benchmark: "glue"
  tasks: ["mnli", "sst2", "mrpc", "cola", "qnli", "qqp", "rte", "stsb"]
  validation_split: "validation"

# Training Hyperparameters for LLMs
training:
  optimizer: "adamw"
  lr_scheduler_type: "cosine" # Cosine scheduler often works better for LLMs
  warmup_ratio: 0.1
  weight_decay: 0.01
  per_device_train_batch_size: 4 # Small batch size to manage VRAM on L40S
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4 # Effective batch size = 4 * 4 = 16
  num_train_epochs: 5 # LLMs converge faster than smaller encoders
  logging_steps: 50
  evaluation_strategy: "epoch"
  eval_steps: 500
  save_strategy: "epoch"
  save_total_limit: 1
  load_best_model_at_end: true
  gradient_checkpointing: true # CRITICAL: Enabled to prevent OOM during FFT on L40S

# Method-Specific Configurations
methods:
  # Full Fine-Tuning (FFT)
  fft:
    learning_rate: 1e-5 # Very low LR to prevent catastrophic forgetting in LLMs

  # Low-Rank Adaptation (LoRA)
  lora:
    learning_rate: 1e-4
    r: 16 # Slightly higher rank for better representation in LLMs
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"] # Standard LoRA targets for Qwen
    lora_dropout: 0.05

  # Static TADA (Embedding tuning only)
  static_tada:
    learning_rate: 2e-4
    trainable_layers: ["model.embed_tokens"]

  # Our Proposed Method: Flexible TADA
  flex_tada:
    learning_rate: 1e-4
    # For Qwen2-1.5B (28 layers): Unfreeze Embedding + Last Layer (Layer 27)
    trainable_layers: ["model.embed_tokens", "model.layers.27"]

# Hardware & Reporting
system:
  seed: 42
  fp16: False # Use half-precision for L40S optimization
  report_to: "tensorboard"